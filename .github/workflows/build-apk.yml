name: Build Mi Norte APK
 
on:
  push:
    branches: [ main ]
  workflow_dispatch:
 
jobs:
  build:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
 
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
 
      - name: Install PWA2APK tool
        run: npm install -g pwa-asset-generator
 
      - name: Create keystore
        run: |
          keytool -genkey -v \
            -keystore android.keystore \
            -alias minorte \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass MiNorte2025 \
            -keypass MiNorte2025 \
            -dname "CN=Miguel Victoria, OU=MAVS, O=Mi Norte, L=Bogota, S=Cundinamarca, C=CO"
 
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
 
      - name: Clone TWA template
        run: |
          git clone https://github.com/GoogleChromeLabs/android-browser-helper.git
          cp -r android-browser-helper/demos/twa-basic twa-app
 
      - name: Configure TWA app
        run: |
          cd twa-app
          cat > app/src/main/res/values/strings.xml << 'STRINGS'
          <resources>
            <string name="app_name">Mi Norte</string>
            <string name="launcher_name">Mi Norte</string>
            <string name="asset_statements">[{ \"relation\": [\"delegate_permission/common.handle_all_urls\"], \"target\": {\"namespace\": \"web\", \"site\": \"https://miguel-victoria.github.io\"}}]</string>
          </resources>
          STRINGS
 
          # Update build.gradle with app details
          sed -i 's/applicationId "com.google.androidbrowserhelper.demos.twabasic"/applicationId "io.github.miguel_victoria.twa"/' app/build.gradle
          sed -i 's|https://svgomg.firebaseapp.com|https://miguel-victoria.github.io/flow-app/login.html|g' app/src/main/AndroidManifest.xml || true
 
      - name: Build APK
        run: |
          cd twa-app
          chmod +x gradlew
          export GRADLE_OPTS="-Xmx1024m -Dorg.gradle.daemon=false"
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android.keystore \
            -Pandroid.injected.signing.store.password=MiNorte2025 \
            -Pandroid.injected.signing.key.alias=minorte \
            -Pandroid.injected.signing.key.password=MiNorte2025
 
      - name: Find APK
        run: find . -name "*.apk" -o -name "*.aab"
 
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: minorte-apk
          path: |
            **/*.apk
            **/*.aab
          retention-days: 30
 
      - name: Upload Keystore
        uses: actions/upload-artifact@v4
        with:
          name: keystore
          path: android.keystore
          retention-days: 90
 
