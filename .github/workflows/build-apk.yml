name: Build Mi Norte APK
 
on:
  push:
    branches: [ main ]
  workflow_dispatch:
 
jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
 
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
 
      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli
 
      - name: Create keystore
        run: |
          keytool -genkey -v \
            -keystore android.keystore \
            -alias minorte \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass MiNorte2025 \
            -keypass MiNorte2025 \
            -dname "CN=Miguel Victoria, OU=MAVS, O=Mi Norte, L=Bogota, S=Cundinamarca, C=CO"
 
      - name: Initialize Bubblewrap project
        run: |
          echo "N" | bubblewrap init \
            --manifest https://miguel-victoria.github.io/flow-app/manifest.json
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}
 
      - name: Copy keystore to project
        run: cp android.keystore twa-manifest/android.keystore 2>/dev/null || cp android.keystore android.keystore
 
      - name: Build APK
        run: |
          echo "MiNorte2025" | bubblewrap build \
            --keystoreFile ./android.keystore \
            --keystorePassword MiNorte2025 \
            --keyAlias minorte \
            --keyPassword MiNorte2025
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}
          GRADLE_OPTS: "-Xmx1024m -Dorg.gradle.daemon=false"
 
      - name: Find and upload APK/AAB
        run: find . -name "*.apk" -o -name "*.aab" | head -20
 
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: minorte-app
          path: |
            **/*.apk
            **/*.aab
          retention-days: 30
 
      - name: Upload Keystore
        uses: actions/upload-artifact@v4
        with:
          name: android-keystore
          path: android.keystore
          retention-days: 90
 
