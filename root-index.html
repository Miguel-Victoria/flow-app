<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mi Norte</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
<script>
// This page lives at miguel-victoria.github.io/index.html
// Supabase redirects email confirmation tokens here
// We intercept and forward to the actual app

const SUPABASE_URL = 'https://gedfmktwiotsubqcfanp.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdlZGZta3R3aW90c3VicWNmYW5wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNDI5NjgsImV4cCI6MjA5MjgxODk2OH0.ZkYd1YVXPUQ_pV__oSK_floiNtSU_1TXiy0Fy-SCr5Q';

const hash = window.location.hash;

// If there's an auth token in the URL, handle it
if (hash && (hash.includes('access_token') || hash.includes('error'))) {
  if (hash.includes('error')) {
    // Token expired or invalid — go to login to try again
    window.location.replace('/flow-app/login.html');
  } else {
    // Valid token — init supabase to establish session, then go to app
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) {
        // Save userId so app knows who this is
        const existing = JSON.parse(localStorage.getItem('flow_config') || '{}');
        existing.userId = session.user.id;
        localStorage.setItem('flow_config', JSON.stringify(existing));
        window.location.replace('/flow-app/login.html');
      } else {
        window.location.replace('/flow-app/login.html');
      }
    });
  }
} else {
  // No token — just go to the app login
  window.location.replace('/flow-app/login.html');
}
</script>
<p style="font-family:sans-serif;text-align:center;padding:3rem;color:#6B8BAA">Redirigiendo...</p>
</body>
</html>
